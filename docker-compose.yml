# Veralux Receptionist - Docker Compose Configuration
#
# Build locally:  docker compose build
# Run:            docker compose up -d
# Local LLM:      docker compose --profile llm up -d vllm-qwen brain  (set BRAIN_URL=http://brain:3001 on runtime)
# Qwen3 TTS:      set TTS_MODE=qwen3_tts_http in .env — ./deploy.sh up enables gpu or cpu profile so qwen3-tts-* starts (not started on plain `compose up` without profile).
# Pull pre-built: docker compose pull && docker compose up -d
#
# When both `image` and `build` are set, `docker compose build` builds locally
# and tags with the image name. `docker compose up` uses whichever image exists.

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"

services:
  # =============================================================================
  # Core Services
  # =============================================================================

  control:
    image: ${REGISTRY:-ghcr.io/nick-veraluxai}/veralux-control-plane:${VERSION:-0.1.0}
    build:
      context: .
      dockerfile: control-plane/Dockerfile
      args:
        # Prefer setting via ./deploy.sh build (defaults to `git rev-parse --short HEAD`) so Docker
        # does not reuse a cached stamp layer from an older build. Optional: export ADMIN_UI_BUILD_STAMP=…
        ADMIN_UI_BUILD_STAMP: ${ADMIN_UI_BUILD_STAMP:-}
    container_name: veralux-control
    restart: unless-stopped
    logging: *default-logging
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:4000/health"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1G
        reservations:
          cpus: "0.25"
          memory: 256M
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=${JWT_SECRET}
      - API_KEY=${API_KEY}
      - LLM_PROVIDER=${LLM_PROVIDER:-openai}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o-mini}
      - LOCAL_LLM_URL=${LOCAL_LLM_URL:-}
      - TELNYX_PHONE_NUMBER=${TELNYX_PHONE_NUMBER}
      - TELNYX_API_KEY=${TELNYX_API_KEY}
      - VERALUX_WEBHOOK_URL=${VERALUX_WEBHOOK_URL:-}
      - BASE_URL=${BASE_URL:-http://localhost:4000}
      - SECRET_ENCRYPTION_KEY=${SECRET_ENCRYPTION_KEY}
      - SECRET_MANAGER=${SECRET_MANAGER:-db}
      - ADMIN_API_KEY=${ADMIN_API_KEY}
      - INSTALLER_USERNAME=${INSTALLER_USERNAME:-VeraLux}
      - INSTALLER_PASSWORD=${INSTALLER_PASSWORD:-}
      - ADMIN_ALLOWED_ORIGINS=${ADMIN_ALLOWED_ORIGINS:-http://localhost:4000}
      # Stripe
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - STRIPE_PUBLISHABLE_KEY=${STRIPE_PUBLISHABLE_KEY}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
      # SMTP (for workflow email actions)
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASS=${SMTP_PASS:-}
      - SMTP_FROM=${SMTP_FROM:-noreply@veralux.ai}
      # ── Redis sync env vars (used by redisSync.ts) ──
      - TTS_MODE=${TTS_MODE:-coqui_xtts}
      - KOKORO_URL=${KOKORO_URL:-http://kokoro:7001/tts}
      - COQUI_XTTS_URL=${COQUI_XTTS_URL:-http://xtts:7002/tts}
      - CHATTERBOX_URL=${CHATTERBOX_URL:-http://chatterbox:7005}
      # Qwen3 is service qwen3-tts-gpu (profile gpu); hostname resolves only when that container is up.
      - QWEN3_TTS_URL=${QWEN3_TTS_URL:-http://veralux-qwen3-tts:7010}
      - WHISPER_URL=${WHISPER_URL:-http://whisper:9000/transcribe}
      - AUDIO_PUBLIC_BASE_URL=${AUDIO_PUBLIC_BASE_URL}
      - AUDIO_STORAGE_DIR=${AUDIO_STORAGE_DIR:-/app/audio}
      - STT_CHUNK_MS=${STT_CHUNK_MS:-100}
      - STT_LANGUAGE=${STT_LANGUAGE:-en}
      - GLOBAL_CONCURRENCY_CAP=${GLOBAL_CONCURRENCY_CAP:-16}
      - TENANT_CONCURRENCY_CAP_DEFAULT=${TENANT_CONCURRENCY_CAP_DEFAULT:-4}
      - TENANT_CALLS_PER_MIN_CAP_DEFAULT=${TENANT_CALLS_PER_MIN_CAP_DEFAULT:-60}
    ports:
      - "${CONTROL_PORT:-4000}:4000"
    networks:
      - veralux-network

  runtime:
    image: ${REGISTRY:-ghcr.io/nick-veraluxai}/veralux-voice-runtime:${VERSION:-0.1.0}
    build:
      context: .
      dockerfile: veralux-voice-runtime/Dockerfile
    container_name: veralux-runtime
    restart: unless-stopped
    logging: *default-logging
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      redis:
        condition: service_healthy
      control:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:4001/health/live"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: "4.0"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 512M
    environment:
      - PORT=4001
      - REDIS_URL=redis://redis:6379
      - CONTROL_URL=http://control:4000
      - LOG_LEVEL=${LOG_LEVEL:-info}
      # LLM / OpenAI
      - LLM_PROVIDER=${LLM_PROVIDER:-openai}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o-mini}
      - LOCAL_LLM_URL=${LOCAL_LLM_URL:-}
      # Telnyx Configuration
      - TELNYX_API_KEY=${TELNYX_API_KEY}
      - TELNYX_PUBLIC_KEY=${TELNYX_PUBLIC_KEY}
      - TELNYX_PHONE_NUMBER=${TELNYX_PHONE_NUMBER}
      - TELNYX_VERIFY_SIGNATURES=${TELNYX_VERIFY_SIGNATURES:-true}
      - TELNYX_ACCEPT_CODECS=${TELNYX_ACCEPT_CODECS:-PCMU,AMR-WB}
      - TELNYX_AMRWB_DECODE=${TELNYX_AMRWB_DECODE:-true}
      - PLAYBACK_PSTN_SAMPLE_RATE=${PLAYBACK_PSTN_SAMPLE_RATE:-24000}
      # URLs
      - PUBLIC_BASE_URL=${PUBLIC_BASE_URL}
      - AUDIO_PUBLIC_BASE_URL=${AUDIO_PUBLIC_BASE_URL}
      # TTS Mode (coqui_xtts | kokoro_http | chatterbox_http | qwen3_tts_http)
      - TTS_MODE=${TTS_MODE:-coqui_xtts}
      - KOKORO_URL=${KOKORO_URL:-http://kokoro:7001/tts}
      - XTTS_URL=${XTTS_URL:-http://xtts:7002}
      - COQUI_XTTS_URL=${COQUI_XTTS_URL:-http://xtts:7002/tts}
      - CHATTERBOX_URL=${CHATTERBOX_URL:-http://chatterbox:7005}
      - CHATTERBOX_VARIANT=${CHATTERBOX_VARIANT:-turbo}
      # Qwen3 is service qwen3-tts-gpu (profile gpu); hostname resolves only when that container is up.
      - QWEN3_TTS_URL=${QWEN3_TTS_URL:-http://veralux-qwen3-tts:7010}
      - QWEN3_TTS_SPEAKER=${QWEN3_TTS_SPEAKER:-Ryan}
      - QWEN3_TTS_LANGUAGE=${QWEN3_TTS_LANGUAGE:-English}
      # Media/Audio
      - MEDIA_STREAM_TOKEN=${MEDIA_STREAM_TOKEN}
      - AUDIO_STORAGE_DIR=${AUDIO_STORAGE_DIR:-/app/audio}
      - WHISPER_URL=${WHISPER_URL:-http://whisper:9000/transcribe}
      - WHISPER_HTTP_KEEPALIVE=${WHISPER_HTTP_KEEPALIVE:-true}
      - WHISPER_HTTP_MAX_CONNECTIONS=${WHISPER_HTTP_MAX_CONNECTIONS:-8}
      # SpeexDSP AEC (default on; set STT_AEC_ENABLED=false to disable)
      - STT_AEC_ENABLED=${STT_AEC_ENABLED:-true}
      # Inbound attenuation before AEC/STT (negative dB; default -3 for PSTN headroom). Set 0 to disable.
      - STT_RX_HEADROOM_DB=${STT_RX_HEADROOM_DB:--3}
      # After TTS: longer grace + RX frame dedupe reduce playback bleed / repeated PCM in Whisper buffers (see .env.example).
      - STT_POST_PLAYBACK_GRACE_MS=${STT_POST_PLAYBACK_GRACE_MS:-900}
      - STT_POST_PLAYBACK_GRACE_MIN_MS=${STT_POST_PLAYBACK_GRACE_MIN_MS:-400}
      - STT_POST_PLAYBACK_GRACE_MAX_MS=${STT_POST_PLAYBACK_GRACE_MAX_MS:-1100}
      - STT_RX_POSTPROCESS_ENABLED=${STT_RX_POSTPROCESS_ENABLED:-true}
      - STT_RX_DEDUPE_WINDOW=${STT_RX_DEDUPE_WINDOW:-48}
      # Speech-to-Text Settings
      - STT_CHUNK_MS=${STT_CHUNK_MS:-100}
      - STT_SILENCE_MS=${STT_SILENCE_MS:-700}
      - STT_MIN_SPEECH_MS_TO_FINALIZE=${STT_MIN_SPEECH_MS_TO_FINALIZE:-280}
      - STT_MIN_SPEECH_BYTES_TO_FINALIZE=${STT_MIN_SPEECH_BYTES_TO_FINALIZE:-8000}
      - DEAD_AIR_MS=${DEAD_AIR_MS:-10000}
      # Unclear STT: retries + TTS reprompt (see env.ts / callSession)
      - STT_UNCLEAR_REPROMPT_ENABLED=${STT_UNCLEAR_REPROMPT_ENABLED:-true}
      - STT_EMPTY_FINAL_EXTRA_TRIES=${STT_EMPTY_FINAL_EXTRA_TRIES:-1}
      - STT_FINAL_ERROR_EXTRA_TRIES=${STT_FINAL_ERROR_EXTRA_TRIES:-1}
      - STT_FINAL_RETRY_BACKOFF_MS=${STT_FINAL_RETRY_BACKOFF_MS:-180}
      - STT_UNCLEAR_REPROMPT_MAX_PER_CALL=${STT_UNCLEAR_REPROMPT_MAX_PER_CALL:-8}
      - STT_UNCLEAR_REPROMPT_COOLDOWN_MS=${STT_UNCLEAR_REPROMPT_COOLDOWN_MS:-2200}
      - STT_UNCLEAR_REPROMPT_PHRASES=${STT_UNCLEAR_REPROMPT_PHRASES:-}
      - STT_UNCLEAR_MIN_LETTERS=${STT_UNCLEAR_MIN_LETTERS:-0}
      - STT_TRANSCRIPT_DEDUPE_ENABLED=${STT_TRANSCRIPT_DEDUPE_ENABLED:-true}
      - STT_TRANSCRIPT_DEDUPE_WINDOW_MS=${STT_TRANSCRIPT_DEDUPE_WINDOW_MS:-2200}
      - STT_TRANSCRIPT_DEDUPE_SIMILARITY=${STT_TRANSCRIPT_DEDUPE_SIMILARITY:-0.9}
      - MEDIA_SEQ_GAP_LOG_MIN=${MEDIA_SEQ_GAP_LOG_MIN:-3}
      # STT WAV debug (listen to ingest vs Whisper-bound audio). See .env.example
      - STT_DEBUG_DIR=${STT_DEBUG_DIR:-/app/audio/stt-debug}
      - STT_DEBUG_DUMP_RX_WAV=${STT_DEBUG_DUMP_RX_WAV:-false}
      - STT_DEBUG_AEC_NEAR_OUT_WAV=${STT_DEBUG_AEC_NEAR_OUT_WAV:-false}
      - STT_DEBUG_AEC_TAP_MAX_MS=${STT_DEBUG_AEC_TAP_MAX_MS:-8000}
      - STT_DEBUG_DUMP_WHISPER_WAVS=${STT_DEBUG_DUMP_WHISPER_WAVS:-false}
      - STT_DEBUG_DUMP_PCM16=${STT_DEBUG_DUMP_PCM16:-false}
      - STT_DEBUG_DUMP_FAR_END_REF=${STT_DEBUG_DUMP_FAR_END_REF:-false}
      - STT_PREWHISPER_GATE=${STT_PREWHISPER_GATE:-false}
      - STT_PREWHISPER_DEDUPE_WINDOW=${STT_PREWHISPER_DEDUPE_WINDOW:-32}
      - STT_PREWHISPER_DEDUPE_MIN_PEAK_ABS=${STT_PREWHISPER_DEDUPE_MIN_PEAK_ABS:-280}
      - STT_PREWHISPER_DUMP_DIR=${STT_PREWHISPER_DUMP_DIR:-/app/audio/stt-debug}
      - STT_PREWHISPER_DUMP_FIRST_N=${STT_PREWHISPER_DUMP_FIRST_N:-10}
      - STT_RX_DEDUPE_MIN_PEAK=${STT_RX_DEDUPE_MIN_PEAK:-}
      # Rate Limiting (defaults: protect single-GPU STT/TTS; raise only after profiling)
      - GLOBAL_CONCURRENCY_CAP=${GLOBAL_CONCURRENCY_CAP:-16}
      - TENANT_CONCURRENCY_CAP_DEFAULT=${TENANT_CONCURRENCY_CAP_DEFAULT:-4}
      - TENANT_CALLS_PER_MIN_CAP_DEFAULT=${TENANT_CALLS_PER_MIN_CAP_DEFAULT:-60}
      - CAPACITY_TTL_SECONDS=${CAPACITY_TTL_SECONDS:-3600}
      # Brain / LLM (optional — set BRAIN_URL when running profile `llm`, see .env.example)
      - BRAIN_USE_LOCAL=${BRAIN_USE_LOCAL:-false}
      - BRAIN_URL=${BRAIN_URL:-}
      # Control Plane integration (workflow automation)
      - CONTROL_PLANE_URL=http://control:4000
      - CONTROL_PLANE_API_KEY=${ADMIN_API_KEY}
    volumes:
      - audio-storage:/app/audio
    ports:
      - "${RUNTIME_PORT:-4001}:4001"
    networks:
      - veralux-network

  # =============================================================================
  # Infrastructure Services
  # =============================================================================

  redis:
    image: redis:7-alpine
    container_name: veralux-redis
    restart: unless-stopped
    logging: *default-logging
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.1"
          memory: 64M
    volumes:
      - redis-data:/data
    networks:
      - veralux-network

  postgres:
    image: postgres:16-alpine
    container_name: veralux-postgres
    restart: unless-stopped
    logging: *default-logging
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-veralux} -d ${POSTGRES_DB:-veralux}"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1G
        reservations:
          cpus: "0.25"
          memory: 128M
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    # ports:
    #   - "${POSTGRES_PORT:-5432}:5432"  # Uncomment to expose for debugging
    networks:
      - veralux-network

  # =============================================================================
  # Tunnel Service (Optional - enable with: docker compose --profile tunnel up)
  # =============================================================================

  # Option A: Cloudflare Tunnel (recommended for production)
  cloudflared:
    image: cloudflare/cloudflared:${CLOUDFLARED_TAG:?Set CLOUDFLARED_TAG}
    container_name: veralux-cloudflared
    restart: unless-stopped
    logging: *default-logging
    profiles:
      - tunnel
      - cloudflare
    command: tunnel run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    network_mode: host
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
    depends_on:
      runtime:
        condition: service_healthy
      control:
        condition: service_healthy

  # Option B: ngrok (for quick testing)
  ngrok:
    image: ngrok/ngrok:${NGROK_TAG:?Set NGROK_TAG}
    container_name: veralux-ngrok
    restart: unless-stopped
    logging: *default-logging
    profiles:
      - ngrok
    environment:
      - NGROK_AUTHTOKEN=${NGROK_AUTHTOKEN}
    command: http runtime:4001 --log stdout
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
    ports:
      - "4040:4040"  # ngrok web interface
    networks:
      - veralux-network
    depends_on:
      runtime:
        condition: service_healthy

  # =============================================================================
  # GPU Services (NVIDIA GPU required - auto-selected by deploy.sh)
  # =============================================================================

  whisper-gpu:
    image: ${REGISTRY:-ghcr.io/nick-veraluxai}/whisper:${VERSION:-0.1.0}
    build:
      context: ./veralux-audio-stack
      dockerfile: Dockerfile.whisper.gpu
    container_name: veralux-whisper
    restart: unless-stopped
    logging: *default-logging
    profiles:
      - gpu
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 300s
    deploy:
      resources:
        limits:
          cpus: "4.0"
          memory: 8G
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["${WHISPER_GPU_IDS:-0}"]
              capabilities: [gpu]
    environment:
      # whisper_server.py reads WHISPER_* (MODEL_SIZE was unused).
      - WHISPER_MODEL=${WHISPER_MODEL:-large-v3}
      - WHISPER_DEVICE=${WHISPER_DEVICE:-cuda}
      - WHISPER_COMPUTE_TYPE=${WHISPER_COMPUTE_TYPE:-float16}
      - NVIDIA_VISIBLE_DEVICES=${WHISPER_GPU_IDS:-0}
      # Load tests / multi-call: raise defaults (was 30/min and 2 concurrent — caused 429 and STT queuing).
      - RATE_LIMIT_PER_MINUTE=${WHISPER_RATE_LIMIT_PER_MINUTE:-10000}
      - WHISPER_MAX_CONCURRENT=${WHISPER_MAX_CONCURRENT:-24}
    ports:
      - "${WHISPER_PORT:-9000}:9000"
    networks:
      veralux-network:
        aliases:
          - whisper

  kokoro-gpu:
    image: ${REGISTRY:-ghcr.io/nick-veraluxai}/kokoro:${VERSION:-0.1.0}
    build:
      context: ./veralux-audio-stack
      dockerfile: Dockerfile.kokoro
    container_name: veralux-kokoro
    restart: unless-stopped
    logging: *default-logging
    profiles:
      - gpu
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "4.0"
          memory: 4G
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    environment:
      - VOICE_ID=${KOKORO_VOICE_ID:-default}
      - KOKORO_MAX_CONCURRENT=${KOKORO_MAX_CONCURRENT:-16}
      - RATE_LIMIT_PER_MINUTE=${KOKORO_RATE_LIMIT_PER_MINUTE:-10000}
    ports:
      - "${KOKORO_PORT:-7001}:7001"
    networks:
      veralux-network:
        aliases:
          - kokoro

  xtts-gpu:
    image: ${REGISTRY:-ghcr.io/nick-veraluxai}/xtts:${VERSION:-0.1.0}
    build:
      context: ./veralux-audio-stack
      dockerfile: Dockerfile.xtts
    container_name: veralux-xtts
    restart: unless-stopped
    logging: *default-logging
    profiles:
      - gpu
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7002/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    deploy:
      resources:
        limits:
          cpus: "4.0"
          memory: 6G
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    environment:
      - LANGUAGE=${XTTS_LANGUAGE:-en}
      - COQUI_TOS_AGREED=1
    ports:
      - "${XTTS_PORT:-7002}:7002"
    networks:
      veralux-network:
        aliases:
          - xtts

  chatterbox-gpu:
    image: ${REGISTRY:-ghcr.io/nick-veraluxai}/chatterbox:${VERSION:-0.1.0}
    build:
      context: ./veralux-audio-stack
      dockerfile: Dockerfile.chatterbox
    container_name: veralux-chatterbox
    restart: unless-stopped
    logging: *default-logging
    profiles:
      - gpu
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://127.0.0.1:7005/health"]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 300s
    deploy:
      resources:
        limits:
          cpus: "8.0"
          memory: 16G
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["${CHATTERBOX_GPU_IDS:-0}"]
              capabilities: [gpu]
    environment:
      - CHATTERBOX_VARIANT=${CHATTERBOX_VARIANT:-turbo}
      - CHATTERBOX_DEVICE=${CHATTERBOX_DEVICE:-cuda}
      - NVIDIA_VISIBLE_DEVICES=${CHATTERBOX_GPU_IDS:-0}
      # N workers = N full model loads on this GPU. Default 1 if vLLM shares the same GPU (see CHATTERBOX_GPU_IDS vs VLLM_GPU_IDS).
      - CHATTERBOX_GUNICORN_WORKERS=${CHATTERBOX_GUNICORN_WORKERS:-1}
      # Chatterbox downloads weights from Hugging Face; Turbo (and some repos) require auth.
      # Create a token at https://huggingface.co/settings/tokens and accept the model license on the model card.
      - HF_TOKEN=${HF_TOKEN:-}
      - HUGGING_FACE_HUB_TOKEN=${HF_TOKEN:-}
      # Reduces CUDA fragmentation; helps large-model loads when VRAM is tight.
      - PYTORCH_CUDA_ALLOC_CONF=${PYTORCH_CUDA_ALLOC_CONF:-expandable_segments:True}
      - RATE_LIMIT_PER_MINUTE=${CHATTERBOX_RATE_LIMIT_PER_MINUTE:-10000}
      - CHATTERBOX_MAX_CONCURRENT=${CHATTERBOX_MAX_CONCURRENT:-1}
    ports:
      - "${CHATTERBOX_PORT:-7005}:7005"
    networks:
      veralux-network:
        aliases:
          - chatterbox

  qwen3-tts-gpu:
    image: ${REGISTRY:-ghcr.io/nick-veraluxai}/qwen3-tts:${VERSION:-0.1.0}
    build:
      context: ./veralux-audio-stack
      dockerfile: Dockerfile.qwen3tts
    container_name: veralux-qwen3-tts
    restart: unless-stopped
    logging: *default-logging
    profiles:
      - gpu
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://127.0.0.1:7010/health"]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 420s
    deploy:
      resources:
        limits:
          cpus: "8.0"
          memory: 24G
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["${QWEN3_TTS_GPU_IDS:-0}"]
              capabilities: [gpu]
    environment:
      - NVIDIA_VISIBLE_DEVICES=${QWEN3_TTS_GPU_IDS:-0}
      - HF_TOKEN=${HF_TOKEN:-}
      - HUGGING_FACE_HUB_TOKEN=${HF_TOKEN:-}
      - QWEN3_TTS_DEVICE=${QWEN3_TTS_DEVICE:-cuda}
      - QWEN3_TTS_MODEL=${QWEN3_TTS_MODEL:-Qwen/Qwen3-TTS-12Hz-1.7B-CustomVoice}
      - PYTORCH_CUDA_ALLOC_CONF=${PYTORCH_CUDA_ALLOC_CONF:-expandable_segments:True}
      - RATE_LIMIT_PER_MINUTE=${QWEN3_TTS_RATE_LIMIT_PER_MINUTE:-10000}
      - QWEN3_TTS_MAX_CONCURRENT=${QWEN3_TTS_MAX_CONCURRENT:-1}
    ports:
      - "${QWEN3_TTS_PORT:-7010}:7010"
    networks:
      veralux-network:
        aliases:
          - qwen3-tts

  # =============================================================================
  # CPU Services (No GPU required - auto-selected by deploy.sh)
  # Same images, just without NVIDIA device reservations. Slower but works anywhere.
  # =============================================================================

  whisper-cpu:
    image: ${REGISTRY:-ghcr.io/nick-veraluxai}/whisper:${VERSION:-0.1.0}
    build:
      context: ./veralux-audio-stack
      dockerfile: Dockerfile.whisper
    container_name: veralux-whisper
    restart: unless-stopped
    logging: *default-logging
    profiles:
      - cpu
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    deploy:
      resources:
        limits:
          cpus: "4.0"
          memory: 4G
        reservations:
          cpus: "1.0"
          memory: 1G
    environment:
      - WHISPER_MODEL=${WHISPER_MODEL:-${WHISPER_MODEL_SIZE:-small}}
      - WHISPER_DEVICE=cpu
      - CUDA_VISIBLE_DEVICES=""
      - RATE_LIMIT_PER_MINUTE=${WHISPER_RATE_LIMIT_PER_MINUTE:-10000}
      - WHISPER_MAX_CONCURRENT=${WHISPER_MAX_CONCURRENT:-24}
    ports:
      - "${WHISPER_PORT:-9000}:9000"
    networks:
      veralux-network:
        aliases:
          - whisper

  kokoro-cpu:
    image: ${REGISTRY:-ghcr.io/nick-veraluxai}/kokoro:${VERSION:-0.1.0}
    build:
      context: ./veralux-audio-stack
      dockerfile: Dockerfile.kokoro
    container_name: veralux-kokoro
    restart: unless-stopped
    logging: *default-logging
    profiles:
      - cpu
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "4.0"
          memory: 4G
        reservations:
          cpus: "1.0"
          memory: 1G
    environment:
      - VOICE_ID=${KOKORO_VOICE_ID:-default}
      - CUDA_VISIBLE_DEVICES=""
      - KOKORO_MAX_CONCURRENT=${KOKORO_MAX_CONCURRENT:-16}
      - RATE_LIMIT_PER_MINUTE=${KOKORO_RATE_LIMIT_PER_MINUTE:-10000}
    ports:
      - "${KOKORO_PORT:-7001}:7001"
    networks:
      veralux-network:
        aliases:
          - kokoro

  xtts-cpu:
    image: ${REGISTRY:-ghcr.io/nick-veraluxai}/xtts:${VERSION:-0.1.0}
    build:
      context: ./veralux-audio-stack
      dockerfile: Dockerfile.xtts
    container_name: veralux-xtts
    restart: unless-stopped
    logging: *default-logging
    profiles:
      - cpu
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7002/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    deploy:
      resources:
        limits:
          cpus: "4.0"
          memory: 6G
        reservations:
          cpus: "1.0"
          memory: 2G
    environment:
      - LANGUAGE=${XTTS_LANGUAGE:-en}
      - CUDA_VISIBLE_DEVICES=""
      - COQUI_TOS_AGREED=1
    ports:
      - "${XTTS_PORT:-7002}:7002"
    networks:
      veralux-network:
        aliases:
          - xtts

  qwen3-tts-cpu:
    image: ${REGISTRY:-ghcr.io/nick-veraluxai}/qwen3-tts:${VERSION:-0.1.0}
    build:
      context: ./veralux-audio-stack
      dockerfile: Dockerfile.qwen3tts
    container_name: veralux-qwen3-tts
    restart: unless-stopped
    logging: *default-logging
    profiles:
      - cpu
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://127.0.0.1:7010/health"]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 900s
    deploy:
      resources:
        limits:
          cpus: "8.0"
          memory: 24G
        reservations:
          cpus: "2.0"
          memory: 4G
    environment:
      - CUDA_VISIBLE_DEVICES=""
      - HF_TOKEN=${HF_TOKEN:-}
      - HUGGING_FACE_HUB_TOKEN=${HF_TOKEN:-}
      - QWEN3_TTS_DEVICE=cpu
      - QWEN3_TTS_MODEL=${QWEN3_TTS_MODEL:-Qwen/Qwen3-TTS-12Hz-1.7B-CustomVoice}
      - RATE_LIMIT_PER_MINUTE=${QWEN3_TTS_RATE_LIMIT_PER_MINUTE:-10000}
      - QWEN3_TTS_MAX_CONCURRENT=${QWEN3_TTS_MAX_CONCURRENT:-1}
    ports:
      - "${QWEN3_TTS_PORT:-7010}:7010"
    networks:
      veralux-network:
        aliases:
          - qwen3-tts

  # ---------------------------------------------------------------------------
  # Local LLM (optional profile: llm) — vLLM Qwen2.5-7B-Instruct-AWQ + brain gateway
  # Start: docker compose --profile llm up -d vllm-qwen brain
  # Point voice runtime at BRAIN_URL=http://brain:3001 (see .env.example).
  # ---------------------------------------------------------------------------
  vllm-qwen:
    image: ${VLLM_IMAGE:-vllm/vllm-openai:cu130-nightly-x86_64}
    container_name: veralux-vllm-qwen
    restart: unless-stopped
    logging: *default-logging
    profiles:
      - llm
    ipc: host
    shm_size: "4gb"
    volumes:
      - vllm-hf-cache:/root/.cache/huggingface
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["${VLLM_GPU_IDS:-1}"]
              capabilities: [gpu]
    environment:
      - NVIDIA_VISIBLE_DEVICES=${VLLM_GPU_IDS:-1}
      - HF_TOKEN=${HF_TOKEN:-}
      - HUGGING_FACE_HUB_TOKEN=${HF_TOKEN:-}
    command:
      - --model
      - ${VLLM_MODEL:-Qwen/Qwen2.5-7B-Instruct-AWQ}
      - --host
      - "0.0.0.0"
      - --port
      - "8000"
      - --max-model-len
      - ${VLLM_MAX_MODEL_LEN:-8192}
      - --gpu-memory-utilization
      - ${VLLM_GPU_MEMORY_UTILIZATION:-0.75}
      # Optional: raise concurrent sequences if you have headroom (watch VRAM at startup).
      - --max-num-seqs
      - ${VLLM_MAX_NUM_SEQS:-256}
    ports:
      - "${VLLM_PORT:-8000}:8000"
    networks:
      - veralux-network
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python3 -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')\"",
        ]
      interval: 30s
      timeout: 15s
      retries: 25
      start_period: 720s

  brain:
    image: ${REGISTRY:-ghcr.io/nick-veraluxai}/veralux-brain:${VERSION:-0.1.0}
    build:
      context: .
      dockerfile: veralux-voice-runtime/brain-gpt4o/Dockerfile
    container_name: veralux-brain
    restart: unless-stopped
    logging: *default-logging
    profiles:
      - llm
    depends_on:
      vllm-qwen:
        condition: service_healthy
    environment:
      - PORT=3001
      - OPENAI_BASE_URL=http://vllm-qwen:8000/v1
      - OPENAI_API_KEY=${VLLM_OPENAI_API_KEY:-EMPTY}
      - OPENAI_MODEL=${VLLM_MODEL:-Qwen/Qwen2.5-7B-Instruct-AWQ}
    ports:
      - "${BRAIN_PORT:-3001}:3001"
    networks:
      - veralux-network
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://127.0.0.1:3001/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s

# =============================================================================
# Volumes & Networks
# =============================================================================

volumes:
  postgres-data:
    name: veralux-postgres-data
  redis-data:
    name: veralux-redis-data
  audio-storage:
    name: veralux-audio-storage
  vllm-hf-cache:
    name: veralux-vllm-hf-cache

networks:
  veralux-network:
    name: veralux-network
    driver: bridge
